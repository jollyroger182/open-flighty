syntax = "proto3";

import "entities/airline.proto";
import "entities/airport.proto";
import "entities/connection.proto";
import "entities/profile.proto";
import "entities/ticket.proto";
import "entities/flight.proto";
import "entities/city.proto";
import "entities/model.proto";

message Entity {
  Airport    airport    = 1;
  Airline    airline    = 2;
  Connection connection = 5;
  Profile    profile    = 8;
  Ticket     ticket     = 12;
  Flight     flight     = 15;
  City       city       = 19;
  Model      model      = 22;
}
