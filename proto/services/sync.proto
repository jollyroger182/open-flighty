syntax = "proto3";

import "common.proto";
import "entity.proto";

message SyncRequest {
  SyncUpdate sync_update = 1;
}

message SyncUpdate {
  Timestamp     timestamp      = 1;
  UpdateSharing update_sharing = 7;
  DeleteFlight  delete_flight  = 11;
}

message UpdateSharing {
  string user_id   = 1;
  bool   is_paused = 2;
}

message DeleteFlight {
  string id = 1;
}

message SyncResponse {
  Pagination      pagination = 1;
  repeated Entity items      = 2;
}