syntax = "proto3";

import "common.proto";
import "entities/airline.proto";
import "entities/airport.proto";

message Flight {
  string     id          = 1;
  FlightCore core        = 2;
  bool       is_archived = 3;
  // field 4: [inferred] unknown
  bool is_my_flight = 5;
  // field 6: [inferred] unknown
  int32 import_source = 7;   // [inferred] how flight was added
  // field 8: [inferred] unknown
  string user_id     = 9;
  string sharing_url = 10;
  // fields 11–12: [inferred] unknown
  Timestamp deleted_at = 13;
}

message FlightCore {
  string             id           = 1;
  DepartureLeg       departure    = 2;
  ArrivalLeg         arrival      = 3;
  Airline            airline      = 4;
  bool               is_cancelled = 5;
  repeated Codeshare codeshares   = 6;
  Equipment          equipment    = 7;
  // string             callsign     = 8;   // ATC callsign e.g. "CPA356"
  // field 9: [inferred] unknown (observed 1)
  repeated FlightCore  inbound_flights = 10;
  repeated FlightEvent events          = 11;
  DelayForecast        delay_forecast  = 12;
  Timestamp            created         = 13;
  Timestamp            last_updated    = 14;
  // field 15: [inferred] unknown
  string number      = 16;  // e.g. "356" (no airline prefix)
  int32  distance_km = 17;
  FaaTmi faa_tmi     = 18;
  // fields 19–20: [inferred] unknown
  // string airline_id = 21;  // reference to Airline.id
}

message DepartureLeg {
  Airport        airport  = 1;
  string         terminal = 2;
  string         gate     = 3;
  FlightSchedule schedule = 4;
  // fields 5–7: [inferred] unknown
  CheckInSchedule check_in_schedule = 8;   // check-in desk open/close
  WeatherInfo     weather           = 9;
  // field 10: [inferred] unknown
  // string airport_id = 11;  // reference to Airport.id
}

message ArrivalLeg {
  Airport        scheduled_airport = 1;
  Airport        actual_airport    = 2;
  string         terminal          = 3;
  string         gate              = 4;
  string         baggage_belt      = 5;
  WeatherInfo    weather           = 6;
  FlightSchedule schedule          = 7;
  // fields 8–12: [inferred] unknown
  // string scheduled_arrival_airport_id = 13;  // original destination Airport.id
  // string arrival_airport_id           = 14;  // actual destination (differs if diverted)
}

message Codeshare {
  Airline airline           = 1;
  string  number            = 2;  // e.g. "356"
  bool    operates_aircraft = 3;  // true if this airline operates the actual aircraft
  // string airline_id        = 4;  // reference to Airline.id
}

message Equipment {
  string tail_number      = 1;   // e.g. "B-LBE"
  string model_name       = 2;   // e.g. "Airbus A330-300"
  int32  range            = 3;   // type range
  int32  cruising_speed   = 4;   // type cruise speed
  string model_iata       = 5;   // e.g. "333"
  string model_icao       = 6;   // e.g. "A333"
  string first_flight     = 7;   // ISO date e.g. "2014-05-19"
  int32  age              = 8;
  string unknown_9        = 9;
  string country_code     = 10;  // 2-letter e.g. "HK"
  string manufacturer     = 11;  // e.g. "Airbus"
  string model_id         = 12;  // reference to AircraftType.id
  string stats_model_name = 13;   // e.g. "Airbus A330-300"
}

message DelayForecast {
  int32 observations       = 1;
  int32 delay_mean_minutes = 2;
}

message FaaTmi {
  // FAA Traffic Management Initiative
  int32     code   = 1;
  Timestamp start  = 2;
  Timestamp end    = 3;
  string    reason = 4;  // e.g. "Weather", "Volume"
}

// TODO
message FlightSchedule {
  Timestamp gate_original     = 1;
  Timestamp gate_estimated    = 2;
  Timestamp gate_actual       = 3;
  Timestamp runway_original   = 4;
  Timestamp runway_estimated  = 5;
  Timestamp runway_actual     = 6;
  Timestamp initial_gate_time = 10;
}

message CheckInSchedule {
  Timestamp open  = 1;
  Timestamp close = 2;
}

message WeatherInfo {
  int32                   temperature    = 1;   // celcius
  int32                   condition      = 2;   // OpenWeatherMap code e.g. 802
  bool                    night          = 3;
  int32                   condition_icon = 4;   // ?
  string                  condition_name = 5;   // e.g. "Scattered Clouds"
  repeated WeatherWarning warnings       = 6;   // present when severe weather active
  int32                   unknown_7      = 7;	  // always 0?
  Timestamp               last_updated   = 8;
}

message WeatherWarning {
  string title       = 1;   // e.g. "Lightning Nearby"
  string description = 2;   // full advisory text
  int32  icon        = 3;
}

// flight events

message FlightEvent {
  Timestamp         recorded_at         = 1;
  BaggageBeltChange baggage_belt_change = 2;
  // fields 2–4: [inferred] unknown
  OoiEvent   ooi_event   = 5;   // gate-out or gate-in timestamp
  GateChange gate_change = 6;   // terminal / gate reassignment
  // fields 7–8: [inferred] unknown
  TimingChange   timing_change   = 9;
  TailAssignment tail_assignment = 10;
}

message BaggageBeltChange {
  string baggage_belt = 1;
}

message OoiEvent {
  int32     which = 1;  // 1 = actualGateOut, 4 = actualGateIn
  Timestamp at    = 2;
}

message GateChange {
  bool   is_arrival = 1;
  string terminal   = 2;
  string gate       = 3;
}

message TimingChange {
  bool      is_arrival   = 1;
  bool      is_estimated = 2;
  bool      unknown_3    = 3;
  Timestamp at           = 4;
}

message TailAssignment {
  string tail_number = 1;
}
