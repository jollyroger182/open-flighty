syntax = "proto3";

message Timestamp {
  int64 seconds = 1;
  int64 nanos   = 2;  // not always present
}

message Pagination {
  string next_url = 1;  // cursor URL for next page of results
  bool   has_more = 2;  // used in sync
}

message Coordinates {
  double latitude  = 1;
  double longitude = 2;
}
